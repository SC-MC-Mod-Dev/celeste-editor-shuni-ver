<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>CELESTE Editor</title>
    <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="styles.css">
</head>
<body class="center">
    <button id="save" class="display-none">Save File</button>
    <div id="file-input-container">
        <button id="file-default-button">Default map, default assets</button>
        <button id="file-blank-button">Blank map, default assets</button>
        <button id="file-input-button">Browse for your own *.p8</button>
        <input type="file" id="file-input" class="display-none">
    </div>
    <div id="level-container" class="center display-none">
        <button id="level-back">&lt;</button>
        <canvas id="level-canvas"></canvas>
        <button id="level-next">&gt;</button>
    </div>
    <canvas id="sheet-canvas" class="display-none"></canvas>

    <!-- Pico-8 Educational Embed -->
    <div id="pico8-embed" class="center" style="margin-top: 20px; width: 100%; max-width: 600px;">
        <div class="iframely-embed">
            <div class="iframely-responsive" style="height: 140px; padding-bottom: 0;">
                <a href="https://www.pico-8-edu.com/" data-iframely-url="https://iframely.net/Mg6IODli?theme=dark"></a>
            </div>
        </div>
    </div>
    <script async src="https://iframely.net/embed.js"></script>

    <script src="main.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/1.3.8/FileSaver.min.js"></script>
</body>
</html>
